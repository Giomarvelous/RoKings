<!DOCTYPE html>
<html>
<head>
<title>RoKings Mines</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    text-align: center;
    font-family: Arial;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.tile {
    width: 60px;
    height: 60px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    border-radius: 8px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>💣 Mines Game</h1>

<p>Balance: <span id="balance">0</span></p>

<button onclick="startGame()">Start Game (bet 10)</button>
<button onclick="cashOut()">Cash Out</button>

<div class="grid" id="grid"></div>

<hr>

<h3>Admin Panel</h3>
<input type="password" id="adminPass" placeholder="password">
<input type="number" id="amount" placeholder="amount">
<button onclick="addBalance()">Add Balance</button>

<script>
let balance = Number(localStorage.getItem("balance") || 100);
let gameActive = false;
let minePositions = [];
let bet = 10;
let currentWin = 0;

document.getElementById("balance").innerText = balance;

function save() {
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
}

function startGame() {
    if (balance < bet) {
        alert("Not enough coins!");
        return;
    }

    balance -= bet;
    save();

    gameActive = true;
    currentWin = 0;

    minePositions = [];
    while (minePositions.length < 5) {
        let r = Math.floor(Math.random() * 25);
        if (!minePositions.includes(r)) minePositions.push(r);
    }

    renderGrid();
}

function renderGrid() {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let i = 0; i < 25; i++) {
        let tile = document.createElement("div");
        tile.className = "tile";

        tile.onclick = () => clickTile(i, tile);

        grid.appendChild(tile);
    }
}

function clickTile(i, tile) {
    if (!gameActive) return;

    if (minePositions.includes(i)) {
        tile.innerText = "💣";
        gameActive = false;
        alert("You hit a mine!");
        return;
    }

    tile.innerText = "💎";
    currentWin += 2;
}

function cashOut() {
    if (!gameActive) return;

    balance += currentWin;
    gameActive = false;
    save();

    alert("Cashed out: +" + currentWin);
}

function addBalance() {
    let pass = document.getElementById("adminPass").value;
    let amt = Number(document.getElementById("amount").value);

    if (pass !== "admin123") {
        alert("Wrong password");
        return;
    }

    balance += amt;
    save();

    alert("Balance updated!");
}
</script>

</body>
</html>
